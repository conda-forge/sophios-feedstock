{% set name = "sophios" %}
{% set version = "0.5.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/PolusAI/sophios/archive/refs/tags/v{{ version }}.tar.gz
  sha256: af4d0bf3128fce8284b12229f6a2377597c78ca4f26e99b3fb9e5af239d60312

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - pip
    - wheel
    - versioneer ==0.29
    - tomli
  run:
    - python >={{ python_min }}
    - cwltool
    - python-graphviz
    - jsonschema
    - toil
    - pyyaml
    - requests
    - mergedeep
    - networkx
    - cwl-utils >=0.32
    - pydantic >=2.6
    - email-validator
    - fastapi
    - docker-py
    - podman-py
    - uvicorn
    - referencing
    - aiofiles

test:
  imports:
    - sophios
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/sophios/
  summary: DSL for inferring the edges of a CWL workflow DAG
  dev_url: https://github.com/PolusAI/sophios
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sameeul
